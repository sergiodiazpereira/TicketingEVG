<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Incidencia</title>
    <link rel="stylesheet" href="stylesVega.css">
</head>
<body>

    <div class="modal-container modal-details">
        <div class="modal-header" style="border-bottom: none; padding-bottom: 20px;">
            <button class="btn-close">&times;</button>
            
            <div class="badges-header">
                <span class="badge badge-red">Incidencia</span>
                <span class="badge badge-blue">Asignado</span>
            </div>

            <h2 class="modal-title" style="text-transform: none; font-size: 22px;">Proyector muestra imagen borrosa</h2>
            <p class="modal-subtitle" style="text-transform: none; font-size: 14px; font-weight: 500;">#3</p>
        </div>

        <hr class="divider">

        <div class="modal-body" style="padding-top: 25px;">
            <div class="form-group full-width" style="margin-bottom: 25px;">
                <label class="form-label">Descripción del problema</label>
                <div class="content-box">
                    El proyector del Aula 102 no enfoca correctamente a pesar de ajustar la lente. Se requiere revisión técnica urgente.
                </div>
            </div>

            <div class="form-row" style="margin-bottom: 10px;">
                <div class="form-group">
                    <label class="form-label">Ubicación</label>
                    <div class="info-row">
                        <svg class="info-icon" viewBox="0 0 24 24">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                        Aula 102, Edificio A
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Prioridad</label>
                    <div>
                        <span class="badge badge-alta">ALTA</span>
                    </div>
                </div>
            </div>

            <hr class="divider-light">

            <div class="form-group full-width" style="margin-bottom: 25px;">
                <label class="form-label" style="color: #94a3b8;">
                    <svg class="label-icon" viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    Seleccionar técnico
                </label>
                <select class="form-control" style="border-color: #cbd5e1;">
                    <option value="" selected>Asignar a un operario...</option>
                    <option value="1">Operario Técnico</option>
                    <option value="2">Soporte Nivel 2</option>
                    <option value="3">Mantenimiento General</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label class="form-label">Categoría</label>
                <div>
                    <span class="badge badge-gray">
                        <svg class="label-icon" style="margin: 0;" viewBox="0 0 24 24">
                            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                            <line x1="7" y1="7" x2="7.01" y2="7"></line>
                        </svg>
                        Sistemas Audiovisuales
                    </span>
                </div>
            </div>
        </div>

        <hr class="divider">

        <div class="modal-footer modal-footer-centered">
            <button class="btn btn-success">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                Marcar como resuelto
            </button>
            <button class="btn btn-outline-custom">Volver</button>
        </div>
    </div>

</body>
</html>
