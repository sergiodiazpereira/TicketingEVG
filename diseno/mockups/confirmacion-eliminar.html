<!DOCTYPE html>
<html class="manuel" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Eliminación</title>
    <link rel="stylesheet" href="../css/estiloAdmin.css">
</head>
<body>

    <div class="modal-overlay">
        <div class="modal-container modal-alert shadow-lg">
            <div class="alert-header">
                <div class="alert-icon-container">
                    <svg viewBox="0 0 24 24">
                        <path d="M3 6h18"></path>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                </div>
                <!-- NOTA: El título y subtítulo cambian en Angular según el tipo ('categoria' u 'operario') -->
                <h2 class="alert-title">¿ELIMINAR CATEGORÍA? / ¿CONFIRMAR ELIMINACIÓN?</h2>
                <p class="alert-subtitle">Esta acción desactivará la clasificación técnica. / Esta acción es permanente y afectará a la gestión histórica de operarios.</p>
            </div>

            <div class="alert-footer">
                <button class="btn btn-outline">Cancelar</button>
                <button class="btn btn-danger shadow-sm">Eliminar Registro</button>
            </div>
        </div>
    </div>

</body>
</html>
