<footer class="intranet-footer" role="contentinfo">
  <div class="if-user">

    @if(user?.foto) {
      <img [src]="user.foto" alt="Foto de perfil" class="if-avatar" referrerpolicy="no-referrer">
    } @else {
      <div class="if-avatar-ph"><i class="bi bi-person-fill"></i></div>
    }

    @if(user?.name) {
      <span class="if-nombre">{{ user.name }}</span>
    }
    @if(!user?.name) {
      <span class="fst-italic">Sin sesión</span>
    }

    @if(rolLabel) {
      <span class="if-badge" [ngClass]="rolClass">{{ rolLabel }}</span>
    }
  </div>

  <div class="if-right">
    <span class="if-clock">{{ fechaHora }}</span>
  </div>
</footer>
