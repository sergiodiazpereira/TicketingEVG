<footer class="intranet-footer" role="contentinfo">
	<div class="if-user">
		@if (foto) {
			<img [src]="foto" alt="" class="if-avatar" referrerpolicy="no-referrer">
		} @else {
			<div class="if-avatar-ph" aria-hidden="true">
				<i class="bi bi-person-fill"></i>
			</div>
		}

		@if (nombre) {
			<span class="if-nombre">{{ nombre }}</span>
		}

		@if (nombre && email) {
			<span class="if-sep">·</span>
		}

		@if (email) {
			<span class="if-email">{{ email }}</span>
		}

		@if (!nombre && !email) {
			<span class="if-sin-sesion">Sin sesón</span>
		}
	</div>

	<div class="if-right">
		@if (rolLabel) {
			<span class="if-badge" [ngClass]="rolClass">{{ rolLabel }}</span>
		}
		<span class="if-copy">Intranet &copy; {{ currentYear }}</span>
	</div>
</footer>
