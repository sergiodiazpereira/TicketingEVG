<!-- Truco CSS puro con persistencia de estado de Angular: Checkbox oculto para colapsar el sidebar -->
<input type="checkbox" id="toggle-sidebar" class="d-none" [checked]="estaColapsado" (change)="toggleSidebar()">

<nav id="sidebarMenu" class="sidebar d-flex flex-column vh-100 sticky-top" [class.sin-transicion]="iniciarSinTransicion">
	<!-- Header Sidebar -->
	<div class="sidebar-header p-4 mb-3 d-flex align-items-center">
		<label for="toggle-sidebar" class="boton-candado rounded-3 p-2 me-3 flex-shrink-0"
			style="cursor: pointer; background-color: var(--amarillo);" title="Abrir/Cerrar menú">
			<i class="bi bi-shield-lock-fill text-white fs-4"></i>
		</label>
		<div class="sidebar-header-texto">
			<div class="fw-bold text-white small lh-1">Administración de</div>
			<div class="fw-bold text-white">TicketingEVG</div>
		</div>
	</div>

	<!-- Links de Navegación -->
	<ul class="nav flex-column mb-auto">
		<li class="nav-item">
			<a class="nav-link" routerLink="/admin/dashboard" routerLinkActive="active" title="Dashboard">
				<i class="bi bi-grid-fill me-3"></i>
				<span class="link-texto">Dashboard</span>
			</a>
		</li>
		<li class="nav-item">
			<a class="nav-link" routerLink="/admin/operarios" routerLinkActive="active" title="Operarios">
				<i class="bi bi-person-badge-fill me-3"></i>
				<span class="link-texto">Operarios</span>
			</a>
		</li>
		<li class="nav-item">
			<a class="nav-link" routerLink="/admin/categorias" routerLinkActive="active" title="Categorías">
				<i class="bi bi-tag-fill me-3"></i>
				<span class="link-texto">Categorías</span>
			</a>
		</li>
		<li class="nav-item">
			<a class="nav-link" routerLink="/portal-tickets" title="Ir al Portal de Tickets">
				<i class="bi bi-arrow-left-right me-3"></i>
				<span class="link-texto">Portal de Tickets</span>
			</a>
		</li>
		<li class="nav-item">
			<a class="nav-link" [href]="landingUrl" title="Volver al Landing">
				<i class="bi bi-house-door-fill me-3"></i>
				<span class="link-texto">Volver al Landing</span>
			</a>
		</li>
		<li class="nav-item">
			<a class="nav-link" (click)="logout()" style="cursor: pointer;" title="Cerrar sesión">
				<i class="bi bi-box-arrow-left me-3"></i>
				<span class="link-texto">Cerrar sesión</span>
			</a>
		</li>
	</ul>
</nav>
