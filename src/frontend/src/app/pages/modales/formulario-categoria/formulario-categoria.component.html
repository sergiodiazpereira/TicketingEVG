<div class="modal-overlay">
	<div class="modal-container modal-form shadow-lg">
		<div class="modal-header">
			<button class="btn-close" (click)="cerrar.emit()">&times;</button>
			<h2 class="modal-title">{{ categoria ? 'Modificar Categoría' : 'Nueva Categoría' }}</h2>
			<p class="modal-subtitle">Define las características de la categoría técnica</p>
		</div>

		<form [formGroup]="formulario" (ngSubmit)="onGuardar()">
			<div class="modal-body">
				<div class="form-group full-width" style="margin-bottom: 25px;">
					<label class="form-label">Nombre de la categoría</label>
					<input type="text" class="form-control" formControlName="nombre" placeholder="Ej: Soporte Nivel 1">
					<div *ngIf="formulario.get('nombre')?.touched && formulario.get('nombre')?.invalid" class="text-danger small mt-1">
						<span *ngIf="formulario.get('nombre')?.errors?.['required']">El nombre es obligatorio.</span>
						<span *ngIf="formulario.get('nombre')?.errors?.['minlength']">El nombre debe tener al menos 3 caracteres.</span>
						<span *ngIf="formulario.get('nombre')?.errors?.['maxlength']">El nombre no puede superar los 50 caracteres.</span>
					</div>
				</div>

				<div class="form-group full-width">
					<label class="form-label">Descripción detallada</label>
					<textarea class="form-control" rows="4" style="resize: vertical; min-height: 100px;" formControlName="descripcion" placeholder="Descripción..."></textarea>
					<div *ngIf="formulario.get('descripcion')?.touched && formulario.get('descripcion')?.invalid" class="text-danger small mt-1">
						<span *ngIf="formulario.get('descripcion')?.errors?.['maxlength']">La descripción no puede superar los 100 caracteres.</span>
					</div>
				</div>
			</div>

			<div class="modal-footer">
				<button type="button" class="btn btn-text" (click)="cerrar.emit()">Cancelar</button>
				<button type="submit" class="btn btn-primary shadow-sm">Guardar Cambios</button>
			</div>
		</form>
	</div>
</div>
