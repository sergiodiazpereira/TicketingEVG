<div class="modal-overlay" *ngIf="tipo === 'categoria' || tipo === 'operario'">
    <div class="modal-container modal-alert shadow-lg">
        <div class="alert-header">
            <div class="alert-icon-container">
                <svg viewBox="0 0 24 24">
                    <path d="M3 6h18"></path>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
            </div>
            <h2 class="alert-title">{{ tipo === 'categoria' ? '¿ELIMINAR CATEGORÍA?' : '¿CONFIRMAR ELIMINACIÓN?' }}</h2>
            <p class="alert-subtitle" *ngIf="tipo === 'categoria'">Esta acción desactivará la clasificación técnica. Los tickets sin asignar podrían verse afectados.</p>
            <p class="alert-subtitle" *ngIf="tipo === 'operario'">Esta acción es permanente y afectará a la<br>gestión histórica de operarios.</p>
        </div>

        <div class="alert-footer">
            <button class="btn btn-outline" (click)="cancelar.emit()">Cancelar</button>
            <button class="btn btn-danger shadow-sm" (click)="confirmar.emit()">Eliminar Registro</button>
        </div>
    </div>
</div>
