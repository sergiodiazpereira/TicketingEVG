<div class="login-container d-flex align-items-center justify-content-center vh-100">
	<div class="card login-card shadow-lg p-4">
		<div class="text-center mb-4">
			<div class="login-icon mb-3">
				<i class="bi bi-shield-lock-fill"></i>
			</div>
			<h1 class="h3 fw-bold text-dark">TicketingEVG</h1>
			<p class="text-muted">Inicia sesión para continuar</p>
		</div>

		<form (submit)="login()">
			@if (error) {
				<div class="alert alert-danger p-2 small text-center mb-3">
					{{ error }}
				</div>
			}
			<div class="mb-3">
				<label for="email" class="form-label small fw-bold">Correo Electrónico</label>
				<div class="input-group">
					<span class="input-group-text bg-light border-end-0">
						<i class="bi bi-envelope text-muted"></i>
					</span>
					<input type="email" id="email" name="email" [(ngModel)]="email" class="form-control border-start-0 bg-light" placeholder="usuario@evg.es" required>
				</div>
			</div>

			<div class="mb-4">
				<label for="password" class="form-label small fw-bold">Contraseña</label>
				<div class="input-group">
					<span class="input-group-text bg-light border-end-0">
						<i class="bi bi-key text-muted"></i>
					</span>
					<input type="password" id="password" name="password" [(ngModel)]="password" class="form-control border-start-0 bg-light" placeholder="••••••••" required>
				</div>
			</div>

			<button type="submit" class="btn btn-evg w-100 p-3 rounded-3 fw-bold text-uppercase shadow-sm">
				Entrar al Sistema
			</button>
		</form>

		<div class="text-center mt-4">
			<a href="#" class="text-decoration-none small text-muted">¿Has olvidado tu contraseña?</a>
		</div>
	</div>
</div>
