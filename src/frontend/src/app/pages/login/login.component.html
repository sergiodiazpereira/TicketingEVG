 * Descripción: Vista de transición y carga silenciosa de SSO. Sin botones de login para acceso directo.

<div class="login-wrapper">
	<div class="glow-bg"></div>
	<div class="glow-bg glow-bg-2"></div>
	
	<div class="loader-container text-center">
		<div *ngIf="error" class="alert alert-danger" style="position:relative; z-index:9999; margin-bottom: 2rem; font-weight: bold; background-color: #ffcccc; color: #cc0000; padding: 15px; border-radius: 8px;">
			{{ error }}
		</div>
		<div class="spinner-growth"></div>
		<p class="loading-text">Iniciando sesión segura mediante SSO...</p>
		<p class="sub-text">Por favor, espera mientras te redirigimos.</p>
	</div>
</div>
