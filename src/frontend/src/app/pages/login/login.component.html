<div class="login-container d-flex align-items-center justify-content-center vh-100">
	<div class="card login-card shadow-lg p-4">
		<div class="text-center mb-4">
			<div class="login-icon mb-3">
				<i class="bi bi-shield-lock-fill"></i>
			</div>
			<h1 class="h3 fw-bold text-dark">TicketingEVG</h1>
			<p class="text-muted">Inicia sesión para continuar</p>
		</div>

		@if (error) {
			<div class="alert alert-danger p-2 small text-center mb-3">
				{{ error }}
			</div>
		}
		
		<div class="d-flex justify-content-center my-4">
			<asl-google-signin-button type="standard" size="large" shape="pill" [width]="300"></asl-google-signin-button>
		</div>

		<div class="text-center mt-4">
			<p class="small text-muted">Asegúrate de usar tu cuenta corporativa.</p>
		</div>
	</div>
</div>
