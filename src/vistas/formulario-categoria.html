<!DOCTYPE html>
<html class="manuel" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Categoría</title>
    <link rel="stylesheet" href="../css/estiloAdmin.css">
</head>
<body>

<div class="modal-overlay">
    <div class="modal-container modal-form shadow-lg">
        <div class="modal-header">
            <button class="btn-close">&times;</button>
            <h2 class="modal-title">Modificar Categoría</h2>
            <p class="modal-subtitle">Define las características de la categoría técnica</p>
        </div>

        <div class="modal-body">
            <div class="form-group full-width" style="margin-bottom: 25px;">
                <label class="form-label">Nombre de la categoría</label>
                <input type="text" class="form-control" value="Soporte Nivel 1">
            </div>

            <div class="form-group full-width">
                <label class="form-label">Descripción detallada</label>
                <textarea class="form-control" rows="4" style="resize: vertical; min-height: 100px;">Atención primaria y resolución de incidencias básicas de primer contacto.</textarea>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn btn-text">Cancelar</button>
            <button class="btn btn-primary shadow-sm">Guardar Cambios</button>
        </div>
    </div>
</div>

</body>
</html>
